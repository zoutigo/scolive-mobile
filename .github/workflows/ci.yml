name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Install emulator runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpulse0

      - name: Start Metro bundler
        run: |
          nohup env NODE_ENV=development EXPO_NO_DEVTOOLS=1 npx expo start --localhost --max-workers 2 >/tmp/metro.log 2>&1 &
          echo $! > /tmp/metro.pid
          echo "Metro PID: $(cat /tmp/metro.pid)"

      - name: Wait for Metro
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8081/status | grep -q "packager-status:running"; then
              echo "Metro is ready."
              exit 0
            fi
            sleep 2
          done
          echo "Metro did not become ready in time."
          exit 1

      - name: Build Detox APKs
        run: npm run e2e:build

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api33-${{ runner.os }}

      - name: Create AVD snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_5
          avd-name: Scolive_Dev_AOSP_API33
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "AVD snapshot generated."

      - name: Run E2E tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_5
          avd-name: Scolive_Dev_AOSP_API33
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: npm run e2e:test

      - name: Dump Metro log on failure
        if: failure()
        run: |
          if [ -f /tmp/metro.log ]; then
            cat /tmp/metro.log
          else
            echo "No Metro log found."
          fi

      - name: Upload Metro log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: metro-log
          path: /tmp/metro.log
          if-no-files-found: ignore
