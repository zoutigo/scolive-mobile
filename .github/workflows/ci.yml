name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

  e2e-build:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Build Detox APKs
        run: npm run e2e:build

      - name: Upload app debug APK
        uses: actions/upload-artifact@v4
        with:
          name: detox-app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload androidTest APK
        uses: actions/upload-artifact@v4
        with:
          name: detox-app-debug-androidTest-apk
          path: android/app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk
          if-no-files-found: error

  e2e:
    needs: e2e-build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        suite:
          - auth-email.e2e.ts
          - auth-phone.e2e.ts
          - onboarding.e2e.ts
          - recovery-password.e2e.ts
          - recovery-pin.e2e.ts
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Install emulator runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpulse0

      - name: Download app debug APK
        uses: actions/download-artifact@v4
        with:
          name: detox-app-debug-apk
          path: android/app/build/outputs/apk/debug

      - name: Download androidTest APK
        uses: actions/download-artifact@v4
        with:
          name: detox-app-debug-androidTest-apk
          path: android/app/build/outputs/apk/androidTest/debug

      - name: Start Metro bundler
        run: |
          nohup env NODE_ENV=development EXPO_NO_DEVTOOLS=1 EXPO_UNSTABLE_HEADLESS=1 npx expo start --localhost --max-workers 2 >/tmp/metro.log 2>&1 &
          echo $! > /tmp/metro.pid
          echo "Metro PID: $(cat /tmp/metro.pid)"

      - name: Wait for Metro
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8081/status | grep -q "packager-status:running"; then
              echo "Metro is ready via localhost /status."
              exit 0
            fi
            if curl -fsS http://localhost:8081 >/dev/null; then
              echo "Metro is ready."
              exit 0
            fi
            sleep 2
          done
          echo "Metro did not become ready in time."
          exit 1

      - name: Warm Metro bundle
        run: |
          for i in {1..30}; do
            if curl -fsS \
              "http://localhost:8081/index.bundle?platform=android&dev=true&minify=false" \
              -o /tmp/index.android.bundle; then
              wc -c /tmp/index.android.bundle
              exit 0
            fi
            sleep 2
          done
          echo "Metro bundle warmup failed."
          exit 1

      - name: Run E2E tests for ${{ matrix.suite }}
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_5
          avd-name: Scolive_Dev_AOSP_API33
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            mkdir -p /tmp/detox-artifacts
            touch /tmp/adb-logcat.txt
            set +e
            npx detox test --configuration android.emu.debug --cleanup --jest-report-specs --record-logs failing --artifacts-location /tmp/detox-artifacts -- --runTestsByPath e2e/tests/${{ matrix.suite }}
            status=$?
            if [ "$status" -ne 0 ]; then
              adb -s emulator-5554 logcat -d >/tmp/adb-logcat.txt 2>&1 || true
              tail -n 400 /tmp/adb-logcat.txt || true
            fi
            exit "$status"

      - name: Dump Metro log on failure
        if: failure()
        run: |
          if [ -f /tmp/metro.log ]; then
            cat /tmp/metro.log
          else
            echo "No Metro log found."
          fi

      - name: Upload Metro log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: metro-log-${{ matrix.suite }}
          path: /tmp/metro.log
          if-no-files-found: ignore

      - name: Upload ADB logcat
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: adb-logcat-${{ matrix.suite }}
          path: /tmp/adb-logcat.txt
          if-no-files-found: ignore

      - name: Upload Detox artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detox-artifacts-${{ matrix.suite }}
          path: /tmp/detox-artifacts
          if-no-files-found: ignore
