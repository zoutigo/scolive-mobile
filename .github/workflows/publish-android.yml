name: Publish Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      mandatory:
        description: "Forcer la mise à jour (minimumVersionCode = ce build)"
        type: boolean
        default: true

concurrency:
  group: publish-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Restore Android release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 secret is missing" >&2
            exit 1
          fi

          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/scolive-release.keystore"

      - name: Fetch google-services.json from VPS
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          if [ -z "$VPS_SSH_KEY" ] || [ -z "$VPS_HOST" ] || [ -z "$VPS_USER" ]; then
            echo "VPS_SSH_KEY/VPS_HOST/VPS_USER secrets are missing" >&2
            exit 1
          fi

          install -m 600 /dev/null "$RUNNER_TEMP/vps_ssh_key"
          echo "$VPS_SSH_KEY" > "$RUNNER_TEMP/vps_ssh_key"

          scp -i "$RUNNER_TEMP/vps_ssh_key" -o StrictHostKeyChecking=accept-new \
            "${VPS_USER}@${VPS_HOST}:/home/ubuntu/apps/scolive-mobile-secrets/google-services.json" \
            android/app/google-services.json

          rm -f "$RUNNER_TEMP/vps_ssh_key"

      - name: Resolve Android build version
        id: version
        run: |
          BASE_VERSION="$(node -p "require('./app.json').expo.version")"
          # VERSION_CODE (entier Android) ne recule jamais : toujours GITHUB_RUN_NUMBER.
          # Cela garantit que toutes les installations existantes reçoivent bien
          # les notifications de mise à jour (latestCode > currentVersionCode).
          VERSION_CODE="${GITHUB_RUN_NUMBER}"
          # VERSION_NAME (affichage) : compteur réinitialisé à chaque nouveau cycle
          # de version mineure. L'offset est lu depuis .version-build-offset (entier
          # égal au dernier GITHUB_RUN_NUMBER du cycle précédent). Pour repartir à
          # +1 lors du prochain bump de version, mettre à jour ce fichier avec la
          # valeur du run courant avant de bumper app.json.
          OFFSET="$(cat .version-build-offset 2>/dev/null | tr -d '[:space:]' || echo 0)"
          DISPLAY_BUILD=$(( GITHUB_RUN_NUMBER - OFFSET ))
          VERSION_NAME="${BASE_VERSION}+${DISPLAY_BUILD}"
          BUILD_ID="${GITHUB_REF_NAME}-${GITHUB_RUN_NUMBER}"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"
          echo "git_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Build signed Android release APK
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL || 'https://scolive.lisaweb.fr/api' }}
          EXPO_PUBLIC_WEB_URL: ${{ vars.EXPO_PUBLIC_WEB_URL || 'https://scolive.lisaweb.fr' }}
          ORG_GRADLE_PROJECT_SCOLIVE_VERSION_NAME: ${{ steps.version.outputs.version_name }}
          ORG_GRADLE_PROJECT_SCOLIVE_VERSION_CODE: ${{ steps.version.outputs.version_code }}
          ORG_GRADLE_PROJECT_SCOLIVE_RELEASE_STORE_FILE: ${{ runner.temp }}/scolive-release.keystore
          ORG_GRADLE_PROJECT_SCOLIVE_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_SCOLIVE_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_SCOLIVE_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "Building release with EXPO_PUBLIC_API_URL=${EXPO_PUBLIC_API_URL}"
          echo "Building release with EXPO_PUBLIC_WEB_URL=${EXPO_PUBLIC_WEB_URL}"
          npm run android:build:release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk-${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.version_code }}
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Publish latest Android build to Scolive API
        env:
          MOBILE_BUILD_UPLOAD_URL: ${{ vars.MOBILE_BUILD_UPLOAD_URL }}
          MOBILE_BUILD_UPLOAD_TOKEN: ${{ secrets.MOBILE_BUILD_UPLOAD_TOKEN }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
          BUILD_ID: ${{ steps.version.outputs.build_id }}
          GIT_SHA: ${{ steps.version.outputs.git_sha }}
          # Sur push (pas de workflow_dispatch), garder le comportement actuel : obligatoire.
          MANDATORY: ${{ github.event.inputs.mandatory || 'true' }}
        run: |
          if [ -z "$MOBILE_BUILD_UPLOAD_TOKEN" ]; then
            echo "MOBILE_BUILD_UPLOAD_TOKEN secret is missing" >&2
            exit 1
          fi

          UPLOAD_URL="${MOBILE_BUILD_UPLOAD_URL:-https://scolive.lisaweb.fr/api/mobile-builds/android}"

          ARGS=(
            --fail --show-error --location
            -X POST "$UPLOAD_URL"
            -H "Authorization: Bearer $MOBILE_BUILD_UPLOAD_TOKEN"
            -F "file=@android/app/build/outputs/apk/release/app-release.apk;type=application/vnd.android.package-archive"
            -F "versionName=$VERSION_NAME"
            -F "versionCode=$VERSION_CODE"
            -F "buildId=$BUILD_ID"
            -F "gitSha=$GIT_SHA"
          )

          if [ "$MANDATORY" = "true" ]; then
            ARGS+=(-F "minimumVersionCode=$VERSION_CODE")
          fi

          curl "${ARGS[@]}"
