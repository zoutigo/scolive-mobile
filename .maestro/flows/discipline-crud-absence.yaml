- extendedWaitUntil:
    visible:
      id: "discipline-student-screen"
    timeout: 15000
- tapOn:
    id: "tab-historique"
- extendedWaitUntil:
    visible: "E2E absence"
    timeout: 15000
- tapOn: "Modifier cet événement"
- tapOn:
    id: "input-duration"
- inputText: "55"
- hideKeyboard
- tapOn:
    id: "btn-submit"
- extendedWaitUntil:
    visible:
      id: "expand-event-life-11"
    timeout: 15000
- tapOn:
    id: "expand-event-life-11"
- extendedWaitUntil:
    visible: "55 min"
    timeout: 15000
- assertVisible: "55 min"
