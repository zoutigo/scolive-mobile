appId: com.zoutigo.scoliveapp
name: Discipline CRUD Absence
tags:
  - discipline
  - crud
  - absence
---
- runFlow:
    when:
      visible: "Process system isn't responding"
    commands:
      - tapOn: "Wait"
- runFlow:
    when:
      visible: "System UI isn't responding"
    commands:
      - tapOn: "Wait"
- runFlow:
    when:
      visible: "Save password to Google?"
    commands:
      - tapOn: "Not now"
- extendedWaitUntil:
    visible:
      id: "submit-login"
    timeout: 30000
- tapOn:
    id: "tab-email"
- tapOn:
    id: "input-email"
- inputText: "teacher@ecole.cm"
- hideKeyboard
- tapOn:
    id: "input-password"
- inputText: "TempPass11"
- hideKeyboard
- tapOn:
    id: "submit-login"
- runFlow:
    when:
      visible: "Save password to Google?"
    commands:
      - tapOn: "Not now"
- extendedWaitUntil:
    visible: "Bienvenue, Valery MBELE"
    timeout: 20000
- openLink: "scolive://discipline-student/student-1?studentName=Remi%20Ntamack"
- extendedWaitUntil:
    visible:
      id: "discipline-student-screen"
    timeout: 30000
- assertVisible: "Discipline"
- tapOn:
    id: "input-reason"
- inputText: "E2E absence"
- hideKeyboard
- tapOn:
    id: "input-duration"
- inputText: "45"
- hideKeyboard
- tapOn:
    id: "btn-submit"
