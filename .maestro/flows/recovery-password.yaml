appId: com.zoutigo.scoliveapp
name: Password Recovery
tags:
  - recovery
  - password
---
- runFlow:
    when:
      visible: "Process system isn't responding"
    commands:
      - tapOn: "Wait"
- runFlow:
    when:
      visible: "System UI isn't responding"
    commands:
      - tapOn: "Wait"
- extendedWaitUntil:
    visible:
      id: "submit-login"
    timeout: 30000
- tapOn:
    id: "tab-email"
- tapOn:
    id: "link-forgot-password"
- extendedWaitUntil:
    visible:
      id: "step-1"
    timeout: 10000
- tapOn:
    id: "input-email"
- inputText: "parent@ecole.cm"
- hideKeyboard
- tapOn:
    id: "btn-step1"
- extendedWaitUntil:
    visible:
      id: "step-2"
    timeout: 15000
- tapOn:
    id: "input-token"
- inputText: "reset-token-12345678"
- hideKeyboard
- tapOn:
    id: "btn-step2"
- extendedWaitUntil:
    visible:
      id: "step-3"
    timeout: 15000
- tapOn:
    id: "input-birthdate"
- inputText: "09011987"
- tapOn:
    id: "input-answer-0"
- inputText: "Abena"
- hideKeyboard
- tapOn:
    id: "input-answer-1"
- inputText: "Douala"
- hideKeyboard
- tapOn:
    point: "90%,12%"
- swipe:
    start: 50%, 80%
    end: 50%, 62%
    duration: 500
- tapOn:
    id: "input-answer-2"
- inputText: "Basket"
- hideKeyboard
- tapOn:
    id: "btn-step3"
- extendedWaitUntil:
    visible:
      id: "step-4"
    timeout: 15000
- tapOn:
    id: "input-new-password"
- inputText: "RecoverPass9"
- hideKeyboard
- scrollUntilVisible:
    element:
      id: "input-confirm-password"
    direction: DOWN
    timeout: 10000
    speed: 80
    visibilityPercentage: 20
    centerElement: true
    waitToSettleTimeoutMs: 500
- tapOn:
    id: "input-confirm-password"
- inputText: "RecoverPass9"
- hideKeyboard
- tapOn:
    id: "btn-step4"
- extendedWaitUntil:
    visible:
      id: "step-5"
    timeout: 15000
- tapOn:
    id: "btn-go-login"
- extendedWaitUntil:
    visible:
      id: "submit-login"
    timeout: 10000
