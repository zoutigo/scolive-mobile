appId: com.zoutigo.scoliveapp
name: Child Class Feed Load Error
tags:
  - feed
  - child
  - class
  - error
  - load
---
- runFlow:
    when:
      visible: "Process system isn't responding"
    commands:
      - tapOn: "Wait"
- runFlow:
    when:
      visible: "System UI isn't responding"
    commands:
      - tapOn: "Wait"
- runFlow:
    when:
      visible: "Not now"
    commands:
      - tapOn: "Not now"
- extendedWaitUntil:
    visible:
      id: "submit-login"
    timeout: 30000
- tapOn:
    id: "tab-email"
- tapOn:
    id: "input-email"
- inputText: "parent@ecole.cm"
- hideKeyboard
- tapOn:
    id: "input-password"
- inputText: "TempPass11"
- hideKeyboard
- tapOn:
    id: "submit-login"
- runFlow:
    when:
      visible: "Not now"
    commands:
      - tapOn: "Not now"
- extendedWaitUntil:
    visible:
      id: "child-card-child-1"
    timeout: 20000
- tapOn:
    id: "child-card-child-1"
- scrollUntilVisible:
    element:
      id: "child-home-link-class-life"
    direction: DOWN
    timeout: 10000
    speed: 40
    visibilityPercentage: 1
    centerElement: false
- extendedWaitUntil:
    visible:
      id: "child-home-link-class-life"
    timeout: 15000
- tapOn:
    id: "child-home-link-class-life"
- extendedWaitUntil:
    visible:
      id: "child-class-feed-error"
    timeout: 20000
- assertVisible: "Chargement du fil impossible"
