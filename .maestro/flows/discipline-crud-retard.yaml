appId: com.zoutigo.scoliveapp
name: Discipline CRUD Retard
tags:
  - discipline
  - crud
  - retard
---
- runFlow:
    when:
      visible: "Process system isn't responding"
    commands:
      - tapOn: "Wait"
- runFlow:
    when:
      visible: "System UI isn't responding"
    commands:
      - tapOn: "Wait"
- runFlow:
    when:
      visible: "Save password to Google?"
    commands:
      - tapOn: "Not now"
- extendedWaitUntil:
    visible:
      id: "submit-login"
    timeout: 30000
- tapOn:
    id: "tab-email"
- tapOn:
    id: "input-email"
- inputText: "teacher@ecole.cm"
- hideKeyboard
- tapOn:
    id: "input-password"
- inputText: "TempPass11"
- hideKeyboard
- tapOn:
    id: "submit-login"
- runFlow:
    when:
      visible: "Save password to Google?"
    commands:
      - tapOn: "Not now"
- extendedWaitUntil:
    visible: "Bienvenue, Valery MBELE"
    timeout: 20000
- openLink: "scolive://discipline-student/student-1?studentName=Remi%20Ntamack"
- extendedWaitUntil:
    visible:
      id: "discipline-student-screen"
    timeout: 30000
- assertVisible: "Discipline"
- tapOn:
    id: "type-chip-RETARD"
- tapOn:
    id: "input-reason"
- inputText: "E2E retard"
- hideKeyboard
- tapOn:
    id: "input-duration"
- inputText: "15"
- hideKeyboard
- tapOn:
    id: "switch-justified"
- tapOn:
    id: "btn-submit"
- extendedWaitUntil:
    visible: "E2E retard"
    timeout: 15000
- assertVisible: "E2E retard"
- openLink: "scolive://discipline-student/student-1?studentName=Remi%20Ntamack"
- extendedWaitUntil:
    visible:
      id: "discipline-student-screen"
    timeout: 15000
- tapOn:
    id: "tab-historique"
- extendedWaitUntil:
    visible: "E2E retard"
    timeout: 15000
- extendedWaitUntil:
    visible:
      id: "edit-event-life-11"
    timeout: 15000
- tapOn:
    id: "edit-event-life-11"
- extendedWaitUntil:
    visible:
      id: "discipline-form"
    timeout: 15000
- assertVisible:
    id: "btn-submit"
- tapOn:
    id: "input-duration"
- inputText: "20"
- hideKeyboard
- tapOn:
    id: "btn-submit"
- extendedWaitUntil:
    visible:
      id: "expand-event-life-11"
    timeout: 15000
- tapOn:
    id: "expand-event-life-11"
- extendedWaitUntil:
    visible: "20 min"
    timeout: 15000
- assertVisible: "20 min"
