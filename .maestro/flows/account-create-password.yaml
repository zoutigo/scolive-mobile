appId: com.zoutigo.scoliveapp
name: Account — Create Password (phone-only user)
tags:
  - account
  - credentials
---
# Garde-fous système Android
- runFlow:
    when:
      visible: "Not now"
    commands:
      - tapOn: "Not now"
- runFlow:
    when:
      visible: "Process system isn't responding"
    commands:
      - tapOn: "Wait"
- runFlow:
    when:
      visible: "Save password to Google?"
    commands:
      - tapOn: "Never"

# Login via email
- extendedWaitUntil:
    visible:
      id: "submit-login"
    timeout: 30000
- tapOn:
    id: "tab-email"
- tapOn:
    id: "input-email"
- inputText: "teacher@ecole.cm"
- hideKeyboard
- tapOn:
    id: "input-password"
- inputText: "TempPass11"
- hideKeyboard
- tapOn:
    id: "submit-login"
- runFlow:
    when:
      visible: "Not now"
    commands:
      - tapOn: "Not now"
- runFlow:
    when:
      visible: "Save password to Google?"
    commands:
      - tapOn: "Never"

# Naviguer vers Mon Compte
- extendedWaitUntil:
    visible:
      id: "header-menu-btn"
    timeout: 20000
- tapOn:
    id: "header-menu-btn"
- extendedWaitUntil:
    visible:
      id: "nav-item-account"
    timeout: 10000
- tapOn:
    id: "nav-item-account"

# Basculer sur l'onglet Sécurité
- extendedWaitUntil:
    visible:
      id: "account-tab-security"
    timeout: 15000
- tapOn:
    id: "account-tab-security"

# Vérifier que la carte sécurité est visible
- extendedWaitUntil:
    visible:
      id: "account-security-card"
    timeout: 10000
# Vérifier que le toggle "mot de passe" est présent (état non configuré implicite)
- assertVisible:
    id: "account-password-section-toggle"

# Ouvrir le formulaire de création de mot de passe
- tapOn:
    id: "account-password-section-toggle"
- extendedWaitUntil:
    visible:
      id: "account-create-password-new-input"
    timeout: 10000

# Saisir et confirmer le nouveau mot de passe
- tapOn:
    id: "account-create-password-new-input"
- inputText: "Kofi2025!"
- hideKeyboard
- tapOn:
    id: "account-create-password-confirm-input"
- inputText: "Kofi2025!"
- hideKeyboard

# Soumettre
- tapOn:
    id: "account-save-create-password"

# Vérifier le toast de succès
- extendedWaitUntil:
    visible: "Mot de passe créé"
    timeout: 10000
- assertVisible: "Mot de passe créé"
